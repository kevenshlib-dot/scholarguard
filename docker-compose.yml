version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: scholarguard
      POSTGRES_USER: sguser
      POSTGRES_PASSWORD: sgpass_dev
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sguser -d scholarguard"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # Uncomment the ollama service if you want a local LLM backend.
  # Requires an NVIDIA GPU with the nvidia-container-toolkit installed.
  # ---------------------------------------------------------------------------
  # ollama:
  #   image: ollama/ollama:latest
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_models:/root/.ollama
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]

  # ---------------------------------------------------------------------------
  # Application
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    entrypoint: ["/bin/bash", "/app/entrypoint.sh"]
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://sguser:sgpass_dev@postgres:5432/scholarguard
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      QDRANT_URL: http://qdrant:6333
      PATH: /app/.venv/bin:/usr/local/bin:/usr/bin:/bin
    volumes:
      - ./api:/app
      - api_venv:/app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_started

  celery_worker:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    entrypoint: ["/bin/bash", "/app/entrypoint.sh"]
    command: ["celery", "-A", "app.worker", "worker", "--loglevel=info", "--concurrency=2"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://sguser:sgpass_dev@postgres:5432/scholarguard
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      QDRANT_URL: http://qdrant:6333
      PATH: /app/.venv/bin:/usr/local/bin:/usr/bin:/bin
    volumes:
      - ./api:/app
      - worker_venv:/app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

# ---------------------------------------------------------------------------
# Named volumes
# ---------------------------------------------------------------------------
volumes:
  pg_data:
  redis_data:
  qdrant_data:
  minio_data:
  api_venv:
  worker_venv:
  # ollama_models:
